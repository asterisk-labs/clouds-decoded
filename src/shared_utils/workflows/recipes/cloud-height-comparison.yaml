steps:
  - name: cloud_mask
    processor: cloud_mask
    config: cloud_mask.yaml
    inputs: [scene]
    output: cloud_mask
    output_file: cloud_mask.tif

  - name: cloud_height_physics
    processor: cloud_height
    config: cloud_height_physics.yaml
    inputs: [scene]
    keyword_inputs: {cloud_mask: cloud_mask}
    output: cloud_height_physics
    output_file: cloud_height_physics.tif

  - name: cloud_height_emulator
    processor: cloud_height_emulator
    config: cloud_height.yaml
    inputs: [scene]
    keyword_inputs: {cloud_mask: cloud_mask}
    output: cloud_height_emulator
    output_file: cloud_height_emulator.tif
