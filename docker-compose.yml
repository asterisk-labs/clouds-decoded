services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always


  producer:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      bash -c "source ~/.bashrc && conda activate geoenv && python producer.py"
    depends_on:
      - redis
    volumes:
      - /mnt/raid/data/CTH_emulator_dataset:/app/CTH_emulator_dataset
    environment:
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: 2g
    command: >
      bash -c "source ~/.bashrc && conda activate geoenv && python worker.py"
    depends_on:
      - redis
    deploy:
      replicas: 8  # number of parallel workers (across nodes)
    volumes:
      - /mnt/raid/data/CTH_emulator_dataset:/app/CTH_emulator_dataset
    environment:
      - REDIS_URL=redis://redis:6379/0
